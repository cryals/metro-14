    changeColor: false
    emptySpriteName: trime_empty
  - type: SolutionContainerManager
    solutions:
      pen:
        maxVol: 10
        reagents:
        - ReagentId: morphine
          Quantity: 10
  - type: Injector
    solutionName: pen
    currentTransferAmount: 10
