- type: entity
  parent: ChemicalMedipen
  id: M14EmergencyMedipenInaprovaline
  name: Кардио-Стимулятор
  description: Широко используемый для купирования удушья при критических состояниях и уменьшения кровотечения.
  components:
  - type: Sprite
    sprite: _Metro14/Objects/Specific/Medical/pin.rsi
    layers:
    - state: trime
      map: ["enum.SolutionContainerLayers.Fill"]
  - type: SolutionContainerVisuals
    maxFillLevels: 1
    changeColor: false
    emptySpriteName: trime_empty
  - type: SolutionContainerManager
    solutions:
      pen:
        maxVol: 10
        reagents:
        - ReagentId: Inaprovaline
          Quantity: 10
  - type: Injector
    solutionName: pen
    currentTransferAmount: 10
    activeModeProtoId: M14BaseHyposprayMode
    allowedModes:
    - M14HyposprayInjectMode
  - type: Item
    size: Small 
  - type: Tag
    tags:
    - M14Medipen

- type: entity
  parent: ChemicalMedipen
  id: M14EmergencyMedipenRadiation
  name: Радиозащитное средство 
  description: Принимается содержимое щприца за 15—20 мин. до предполагаемого облучения.
  components:
  - type: Sprite
    sprite: _Metro14/Objects/Specific/Medical/pin.rsi
    layers:
    - state: trime3
      map: ["enum.SolutionContainerLayers.Fill"]
  - type: SolutionContainerVisuals
    maxFillLevels: 1
    changeColor: false
    emptySpriteName: trime_empty
  - type: SolutionContainerManager
    solutions:
      pen:
        maxVol: 10
        reagents:
        - ReagentId: PotassiumIodide
          Quantity: 10
  - type: Injector
    solutionName: pen
    currentTransferAmount: 10
    activeModeProtoId: M14BaseHyposprayMode
    allowedModes:
    - M14HyposprayInjectMode
  - type: Item
    size: Small 
  - type: Tag
    tags:
    - M14Medipen

- type: entity
  parent: ChemicalMedipen
  id: M14EmergencyMedipenMorphine
