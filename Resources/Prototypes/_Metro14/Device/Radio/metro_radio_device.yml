- type: entity
  id: M14RadioBase
  parent: BaseItem
  abstract: true
  components:
  - type: ActivatableUI
    key: enum.RadioUI.UI
    requiresComplex: true
  - type: UserInterface
    interfaces: {enum.RadioUI.UI: {type: RadioFrequencyBoundUserInterface}}
  - type: MetroRadioFrequency
    frequency: 300
  - type: MetroRadioMicrophone
  - type: MetroRadioSpeaker
  - type: ActiveListener
  - type: PowerCellDraw
    enabled: false
  - type: ItemSlots
    slots: {cell_slot: {name: power-cell-slot-component-slot-name-default, startingItem: PowerCellMedium}}
  - type: ContainerContainer
    containers: {cell_slot: !type:ContainerSlot {}}
  - type: PowerCellSlot
    cellSlotId: cell_slot
  - type: Sprite
    sprite: Objects/Devices/securityhandy.rsi
    layers:
      - state: walkietalkie
      - state: walkietalkie-on
    state: walkietalkie
  - type: Speech
    speechVerb: Robotic
  - type: Item
    sprite: Objects/Devices/securityhandy.rsi
    heldPrefix: walkietalkie

