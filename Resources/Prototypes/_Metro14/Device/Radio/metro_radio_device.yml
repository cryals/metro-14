- type: entity
  name: рация 
  suffix: Спарта
  description: Смерть в нищете...
  parent: BaseItem
  id: M14RadioHandheldSparta
  components:
  - type: ActivatableUI
    key: enum.RadioUI.UI
    requiresComplex: true
  - type: UserInterface
    interfaces: {enum.RadioUI.UI: {type: RadioFrequencyBoundUserInterface}}
  - type: StandardRadio
    frequency: 1426
    enableSound:
      path: /Audio/_Metro14/Interactions/radio-enable0.ogg
    disableSound:
      path: /Audio/_Metro14/Interactions/radio-disable1.ogg
    lowBatterySound:
      path: /Audio/Effects/beep1.ogg
    interferenceSounds:
      collection: Inteferentions
    speakType: Whisper
    lowDrawRate: 0.5
  - type: ActiveListener
  - type: PowerCellDraw
    enabled: false
  - type: ItemSlots
    slots: {cell_slot: {name: power-cell-slot-component-slot-name-default, startingItem: PowerCellMedium}}
  - type: ContainerContainer
    containers: {cell_slot: !type:ContainerSlot {}}
  - type: PowerCellSlot
    cellSlotId: cell_slot
  - type: Sprite
    sprite: Objects/Devices/securityhandy.rsi
    layers:
      - state: walkietalkie
      - state: walkietalkie-on
    state: walkietalkie
  - type: Speech
    speechVerb: Robotic
  - type: Item
    sprite: Objects/Devices/securityhandy.rsi
    heldPrefix: walkietalkie

