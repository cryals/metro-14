- type: entity
  name: Мосинка
  parent: [BaseWeaponSniper, BaseGunWieldable]
  id: M14WeaponSniperMosin
  description: Реликт,что тут скажешь...
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Snipers/bolt_gun_wood.rsi
    layers:
    - state: base
    - state: base1
      map: [ "enum.SolutionContainerLayers.Fill" ]
      visible: false
  - type: Appearance
  - type: SolutionContainerVisuals
    maxFillLevels: 1
    fillBaseName: base
    inHandsFillBaseName: -fill-
    inHandsMaxFillLevels: 1
    equippedFillBaseName: -fill-
    equippedMaxFillLevels: 1
  - type: MeleeWeapon
    wideAnimationRotation: -135
    damage:
      types:
        Piercing: 12
    angle: 0
    animation: WeaponArcThrust
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
  - type: MeleeRequiresWield
  - type: AltFireMelee
    attackType: Heavy
  - type: SolutionContainerManager
    solutions:
      melee:
        maxVol: 2
  - type: MeleeChemicalInjector
    solution: melee
  - type: RefillableSolution
    solution: melee
  - type: InjectableSolution
    solution: melee
  - type: SolutionTransfer
    maxTransferAmount: 2
  - type: Sharp
    butcherDelayModifier: 2
  - type: StaticPrice
    price: 500


- type: entity
  name: тесак культиста
  parent: BaseKnife
  id: M14ButchCleaver
  description: Огромный тесак для показания статуса культиста
  components:
  - type: Tag
    tags:
    - Knife
    - Cleaver
  - type: Sprite
    sprite: _Metro14/Objects/Weapons/melee/butcher.rsi
    state: butch
  - type: MeleeWeapon
    wideAnimationRotation: -115
    attackRate: 1.9
    damage:
      types:
        Slash: 9
  - type: Item
    size: Normal
    sprite: _Metro14/Objects/Weapons/melee/butcher.rsi
  - type: GuideHelp
    guides:
    - Chef
    - FoodRecipes
  - type: Fixtures
    fixtures:
      fix1:
        shape: !type:PolygonShape
          vertices:
          - -0.58,-0.12
          - -0.34,-0.55
          - 0.6,-0.075
          - 0.375,0.375
        density: 20 # derived from base_item
        mask:
        - ItemMask
        restitution: 0.3
        friction: 0.2